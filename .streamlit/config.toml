[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"
port = 8501
maxMessageSize = 500
enableWebsocketCompression = true
maxUploadSize = 200
runOnSave = false
# Mantener la conexión WebSocket viva — ping cada 15 segundos
# Intervalo más corto para prevenir cierres por proxies/Cloudflare/Streamlit Cloud
websocketPingInterval = 15
# Tiempo (segundos) que el servidor espera antes de limpiar una sesión
# cuyo WebSocket se desconectó. 86400 = 24 horas de gracia.
# Permite que los analistas dejen la app abierta todo el día sin perder sesión.
disconnectedSessionTTL = 86400

[browser]
gatherUsageStats = false
serverPort = 8501
serverAddress = "0.0.0.0"

[client]
toolbarMode = "minimal"
showErrorDetails = false

[runner]
fastReruns = true

[logger]
level = "info"
messageFormat = "%(asctime)s %(message)s"
